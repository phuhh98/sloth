name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/component-hub/**"
      - ".github/workflows/docs-pages.yml"
  pull_request:
    paths:
      - "apps/docs/**"
      - "packages/component-hub/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test component contract policy
        run: pnpm --filter @sloth/component-hub run test

      - name: Validate component contract version policy
        run: |
          if [ -n "${GITHUB_BASE_REF}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            COMPARE_REF="$(git merge-base HEAD FETCH_HEAD)"
          else
            COMPARE_REF="$(git rev-parse HEAD^)"
          fi
          pnpm --filter @sloth/component-hub run validate:contracts -- --compare-ref "$COMPARE_REF"

      - name: Test registry state logic
        run: pnpm --filter apps-docs run test:registry

      - name: Validate tracked registry state
        run: |
          pnpm --filter apps-docs run registry:prepare
          test -z "$(git status --short --untracked-files=all -- apps/docs/static/registry/state.json)"

      - name: Build docs site
        run: pnpm --filter apps-docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
